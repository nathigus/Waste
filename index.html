<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Down for You ♡</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffc2d1;
            --deep-pink: #fb6f92;
            --white-glass: rgba(255, 255, 255, 0.25);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            color: #4a4a4a;
        }

        /* พื้นหลังมีลูกเล่นหัวใจลอย */
        .bg-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating {
            position: absolute;
            animation: move 10s linear infinite;
            opacity: 0.5;
            color: white;
        }

        @keyframes move {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Container หลัก */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--deep-pink);
        }

        .sub-text {
            font-weight: 200;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* ระบบ Countdown หลายช่อง */
        .countdown-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .time-box {
            background: white;
            padding: 15px 5px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
        }

        .number {
            display: block;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--deep-pink);
            font-family: 'Montserrat', sans-serif;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #aaa;
            margin-top: 5px;
            display: block;
        }

        .footer-tag {
            margin-top: 40px;
            font-size: 0.75rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="bg-elements" id="bg-elements"></div>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Special Someone" class="profile-img">
        
        <h1 id="headline">WAITING FOR...</h1>
        <p class="sub-text">นับถอยหลังสู่คนพิเศษของ natthika</p>

        <div class="countdown-wrapper">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>

        <p class="footer-tag">♡ see you on your special day ♡</p>
    </div>

    <script>
        // --- ตั้งค่าวันเกิดตรงนี้ (ปี-เดือน-วัน) ---
        const targetDate = new Date("2026-06-12T00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const gap = targetDate - now;

            // การคำนวณเวลา
            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const d = Math.floor(gap / day);
            const h = Math.floor((gap % day) / hour);
            const m = Math.floor((gap % hour) / minute);
            const s = Math.floor((gap % minute) / second);

            // แสดงผล
            document.getElementById("days").innerText = d < 10 ? "0"+d : d;
            document.getElementById("hours").innerText = h < 10 ? "0"+h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0"+m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0"+s : s;

            // เมื่อถึงวันเกิด
            if (gap <= 0) {
                document.getElementById("headline").innerText = "HAPPY BIRTHDAY! 🎂";
                document.getElementById("days").innerText = "H";
                document.getElementById("hours").innerText = "B";
                document.getElementById("minutes").innerText = "D";
                document.getElementById("seconds").innerText = "♡";
                clearInterval(timer);
            }
        }

        const timer = setInterval(updateCountdown, 1000);
        updateCountdown();

        // สร้างหัวใจลอยแบบสุ่ม
        const bg = document.getElementById('bg-elements');
        const icons = ['❤', '☁', '✨', '🌸'];
        
        function createFloating() {
            const el = document.createElement('div');
            el.className = 'floating';
            el.innerText = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 20 + 10) + 'px';
            el.style.animationDuration = (Math.random() * 5 + 5) + 's';
            bg.appendChild(el);

            setTimeout(() => { el.remove(); }, 10000);
        }

        setInterval(createFloating, 500);
    </script>
</body>
</html>
